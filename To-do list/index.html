<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #2a2a2a;
            color: aliceblue;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }
        #app-container {
            border: 4px solid #ffff;
            min-height: 200px; 
            width: 600px;
            background-color: #3d3c3c;
            padding: 20px;
            border-radius: 8px;
        }
        #input-area {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            padding: 8px;
            width: 80%;
            border: 1px solid red;
            border-radius: 4px;
        }
        button {
            padding: 8px 16px;
            border: 1px solid red;
            cursor: pointer;
            background-color: #eee;
            border-radius: 4px;
            font-weight: bold;
        }
        ul {
            margin-top: 20px;
            list-style-type: none; 
        }
        li {
            background-color: #555;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between; /* Pushes text left and button right */
            align-items: center;
        }
        /* New styling for the delete button */
        .delete-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <h1>To-Do List</h1>
        <div id="input-area">
            <input type="text" placeholder="Add Notes" id="input-text">
            <button id="addBtn">Add</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <script>
        let inputField = document.querySelector("#input-text");
        let addBtn = document.querySelector("#addBtn"); 
        let list = document.querySelector("#taskList");

        addBtn.addEventListener("click", function() {
            let taskText = inputField.value;

            if(taskText.trim() === ""){
                alert("Please enter something!");
                return;
            }

            // 1. Create the new list item
            let newListItem = document.createElement('li');
            newListItem.innerText = taskText;

            // 2. Create the Delete button
            let deleteBtn = document.createElement('button');
            deleteBtn.innerText = "Delete";
            deleteBtn.classList.add("delete-btn"); // Add the CSS class

            // 3. Add a click event to the Delete button
            deleteBtn.addEventListener("click", function() {
                newListItem.remove(); // This deletes the entire <li> from the screen
            });

            // 4. Attach the Delete button to the list item
            newListItem.appendChild(deleteBtn);

            // 5. Attach the finished list item (with its button) to the main <ul>
            list.appendChild(newListItem);

            // 6. Clear the input box
            inputField.value = ""; 
        });
    </script>
</body>
</html>
